name: PR Validation

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - "**.py"
      - "requirements*.txt"
      - ".github/workflows/pr-validation.yml"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pandas openpyxl matplotlib
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with ruff
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          ruff check --select=E9,F63,F7,F82 --target-version=py311 .
          # Exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          ruff check --exit-zero --target-version=py311 .

      - name: Compile Python files
        run: |
          # SECURITY: Use -exec to securely handle file paths with spaces and prevent word splitting/command injection
          find . -name "*.py" -not -path "*/venv/*" -not -path "*/.venv/*" -exec python3 -m py_compile {} +

      - name: Run tests
        run: |
          if [ -d tests ]; then
            python3 -m pytest tests/ -v || echo "::warning::Some tests failed"
          else
            echo "::notice::No tests directory found, skipping pytest"
          fi

      - name: Check for pandas OOM issues
        run: |
          # Verify MAX_FILE_SIZE constants are present in analysis scripts
          grep -r "MAX_FILE_SIZE" Series_*/Analysis/*.py || echo "::warning::No MAX_FILE_SIZE limit found in analysis scripts"
