name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check Python Syntax
        run: |
          python3 -m py_compile code_health_scanner.py
          python3 -m py_compile Series_27/Analysis/outlier_analysis_series27.py
          python3 -m py_compile .github/scripts/repository_automation_common.py
          python3 -m py_compile .github/scripts/repository_automation_tasks.py
